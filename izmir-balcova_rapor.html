const ALL_COLS=["Durum", "İlan No", "Mahalle", "Fiyat", "Ofis", "Danışman", "Telefon", "Satıcı Tipi", "İlan Tarihi", "Emlak Tipi", "m² (Brüt)", "m² (Net)", "Açık Alan m²", "Oda Sayısı", "Bina Yaşı", "Bulunduğu Kat", "Kat Sayısı", "Isıtma", "Banyo Sayısı", "Mutfak", "Balkon", "Asansör", "Otopark", "Eşyalı", "Kullanım Durumu", "Site İçerisinde", "Site Adı", "Aidat (TL)", "Depozito TL", "Tapu Durumu", "Kimden", "Ortalama Gün", "Ortalama Gün.1", "Brüt m² Fiyatı", "Net m² Fiyatı", "İlk Yayın Fiyatı", "İlandan Çıkış", "Pasif Gün", "Güncel Fiyat", "Geri Dönüş", "Fiyat Değişimi", "Son Durum", "Emsal_Analizi", "Rekabet_Skoru", "Notlar", "Notlar.1"];
let filtered=[...ALL_DATA],sortCol=null,sortDir=1;
const slicerVals={},hiddenCols=new Set();
const colChecks=document.getElementById('colChecks');
ALL_COLS.forEach(col=>{
  const d=document.createElement('div');d.className='col-check';
  d.innerHTML=`<input type="checkbox" id="cc_${col.replace(/[^a-z0-9]/gi,'_')}" checked onchange="toggleCol('${col}',this.checked)"><label for="cc_${col.replace(/[^a-z0-9]/gi,'_')}">${col}</label>`;
  colChecks.appendChild(d);
});
function toggleColPanel(){document.getElementById('colPanel').classList.toggle('open');}
function toggleCol(col,show){show?hiddenCols.delete(col):hiddenCols.add(col);rebuildHeader();renderTable();}
const fg=document.getElementById('filterGroups');
Object.entries(SLICER_OPTS).forEach(([col,opts])=>{
  const id=col.replace(/[^a-z0-9]/gi,'_');
  const grp=document.createElement('div');grp.className='filter-group';
  grp.innerHTML=`<div class="filter-group-label" onclick="toggleGroup('${id}')">${col} <span class="toggle" id="tgl_${id}">▲</span></div>
  <div class="filter-items" id="fi_${id}">
    <div class="filter-item active" id="all_${id}" onclick="selectFilter('${col}','')">
      <span class="filter-item-name">Tümü</span><span class="filter-item-count" id="cnt_all_${id}">${ALL_DATA.length}</span>
    </div>
    ${opts.map(o=>`<div class="filter-item" id="fi_${id}_${o.replace(/[^a-z0-9]/gi,'_')}" onclick="selectFilter('${col}','${o.replace(/'/g,"\'")}')"><span class="filter-item-name">${o}</span><span class="filter-item-count">—</span></div>`).join('')}
  </div>`;
  fg.appendChild(grp);
});
function toggleGroup(id){const el=document.getElementById('fi_'+id),tgl=document.getElementById('tgl_'+id);el.style.display===('none')?((el.style.display='',tgl.textContent='▲')):((el.style.display='none',tgl.textContent='▼'));}
function selectFilter(col,val){
  slicerVals[col]=val;
  const id=col.replace(/[^a-z0-9]/gi,'_');
  document.querySelectorAll(`#fi_${id} .filter-item`).forEach(el=>el.classList.remove('active'));
  const t=val===''?document.getElementById(`all_${id}`):document.getElementById(`fi_${id}_${val.replace(/[^a-z0-9]/gi,'_')}`);
  if(t)t.classList.add('active');
  applyFilters();
}
function updateSidebarCounts(){
  Object.entries(SLICER_OPTS).forEach(([col,opts])=>{
    const id=col.replace(/[^a-z0-9]/gi,'_');
    const ae=document.getElementById(`cnt_all_${id}`);if(ae)ae.textContent=filtered.length;
    opts.forEach(o=>{
      const cnt=filtered.filter(r=>String(r[col]||'')===o).length;
      const ie=document.getElementById(`fi_${id}_${o.replace(/[^a-z0-9]/gi,'_')}`);
      if(ie){const ce=ie.querySelector('.filter-item-count');if(ce)ce.textContent=cnt;ie.style.opacity=cnt===0?'0.35':'1';}
    });
  });
}
function rebuildHeader(){
  const thead=document.getElementById('thead');
  const trh=document.createElement('tr');
  const th0=document.createElement('th');th0.textContent='İşlem';trh.appendChild(th0);
  ALL_COLS.filter(c=>!hiddenCols.has(c)).forEach(col=>{
    const th=document.createElement('th');th.textContent=col;
    if(sortCol===col)th.classList.add(sortDir===1?'sort-asc':'sort-desc');
    th.onclick=()=>doSort(col,th);
    trh.appendChild(th);
  });
  thead.innerHTML='';thead.appendChild(trh);
}
rebuildHeader();
function parseNum(v){
  if(v==null||v==='')return NaN;
  if(typeof v==='number')return v;
  const s=String(v).trim();
  if(/^\d{1,3}(\.\d{3})*(,\d+)?$/.test(s))return parseFloat(s.replace(/\./g,'').replace(',','.'));
  return parseFloat(s);
}
function avgArr(arr){const s=arr.filter(v=>v!=null&&!isNaN(Number(v))&&Number(v)>0).map(Number);return s.length?s.reduce((a,b)=>a+b,0)/s.length:null;}
function fmtTL(v){if(!v)return'—';if(v>=1000000)return(v/1000000).toFixed(1)+' M TL';if(v>=1000)return Math.round(v/1000)+' K TL';return v.toLocaleString('tr-TR')+' TL';}
function updateKPI(){
  const el=id=>document.getElementById(id);
  const aktif=filtered.filter(r=>{const d=(r['Durum']||'').toUpperCase();return d.includes('AKTIF')||d.includes('AKT\u0130F');});
  const pasif=filtered.filter(r=>(r['Durum']||'').toUpperCase().includes('PAS'));
  const ap=filtered.filter(r=>{const d=(r['Durum']||'').toUpperCase();return d.includes('AKTIF')||d.includes('AKT\u0130F')||d.includes('PAS');});
  const fK=ALL_COLS.includes('Güncel Fiyat')?'Güncel Fiyat':(ALL_COLS.includes('Fiyat')?'Fiyat':null);
  const m2K=ALL_COLS.find(c=>['m² (Brüt)','m² (Net)','m²'].includes(c));
  const m2fK=ALL_COLS.find(c=>['Brüt m² Fiyatı','Net m² Fiyatı','m² Fiyatı'].includes(c));
  const tK=ALL_COLS.includes('Tapu Durumu')?'Tapu Durumu':null;
  const fiyatlar=fK?aktif.map(r=>parseNum(r[fK])).filter(v=>!isNaN(v)&&v>0):[];
  const m2ler=m2K?aktif.map(r=>parseNum(r[m2K])).filter(v=>!isNaN(v)&&v>0):[];
  const tumFiy=m2fK?ap.map(r=>parseNum(r[m2fK])).filter(v=>!isNaN(v)&&v>0):[];
  const musFiy=tK&&m2fK?ap.filter(r=>(r[tK]||'').includes('M\u00fcstakil')).map(r=>parseNum(r[m2fK])).filter(v=>!isNaN(v)&&v>0):[];
  const hisFiy=tK&&m2fK?ap.filter(r=>(r[tK]||'').includes('Hisseli')).map(r=>parseNum(r[m2fK])).filter(v=>!isNaN(v)&&v>0):[];
  if(el('kpi-toplam'))el('kpi-toplam').textContent=filtered.length.toLocaleString('tr-TR');
  if(el('kpi-aktif'))el('kpi-aktif').textContent=aktif.length.toLocaleString('tr-TR');
  if(el('kpi-pasif'))el('kpi-pasif').textContent=pasif.length.toLocaleString('tr-TR');
  const mf=avgArr(fiyatlar);if(el('kpi-fiyat'))el('kpi-fiyat').textContent=mf?fmtTL(mf):'—';
  const mm=avgArr(m2ler);if(el('kpi-m2'))el('kpi-m2').textContent=mm?Math.round(mm).toLocaleString('tr-TR')+' m²':'—';
  if(el('kpi-m2fiy')){
    const t=avgArr(tumFiy),ms=avgArr(musFiy),hs=avgArr(hisFiy);
    let txt=t?Math.round(t).toLocaleString('tr-TR')+' TL':'—';
    if(ms)txt+=`<br><span style="font-size:9px;color:#86efac">Müstakil: ${Math.round(ms).toLocaleString('tr-TR')}</span>`;
    if(hs)txt+=`<br><span style="font-size:9px;color:#fbbf24">Hisseli: ${Math.round(hs).toLocaleString('tr-TR')}</span>`;
    el('kpi-m2fiy').innerHTML=txt;
  }
}
function durumBadge(v){
  const s=(v||'').toUpperCase();
  if(s.includes('AKTIF')||s.includes('AKT\u0130F'))return`<span class="badge b-aktif">${v}</span>`;
  if(s.includes('PAS'))return`<span class="badge b-pasif">${v}</span>`;
  return`<span class="badge b-other">${v}</span>`;
}
function fmtCell(col,val){
  if(val===null||val===undefined||val==='')return'<span class="muted">—</span>';
  const s=String(val);
  if(col==='Durum')return durumBadge(s);
  if(['Fiyat','İlk Yayın Fiyatı','Güncel Fiyat'].includes(col)){
    const n=parseNum(val);
    if(!isNaN(n)&&n>0)return`<span class="price-c">${n>=1000000?(n/1000000).toFixed(2)+' M':(n>=1000?Math.round(n/1000)+' K':n.toLocaleString('tr-TR'))}</span>`;
  }
  if(['Brüt m² Fiyatı','Net m² Fiyatı','m² Fiyatı'].includes(col)){
    const n=parseNum(val);if(!isNaN(n)&&n>0)return`<span class="m2fiy-c num-r">${Math.round(n).toLocaleString('tr-TR')}</span>`;
  }
  if(['m² (Brüt)','m² (Net)','m²'].includes(col)){
    const n=parseNum(val);if(!isNaN(n)&&n>0)return`<span class="num-r">${Math.round(n).toLocaleString('tr-TR')}</span>`;
  }
  if(col==='Telefon'&&s){
    const nums=s.split('|').map(p=>p.trim()).filter(p=>p);
    if(nums.length)return nums.map(n=>`<a href="tel:${n.replace(/\s/g,'')}" class="btn-tel">📞 ${n}</a>`).join(' ');
  }
  if(s.length>40)return`<span title="${s}">${s.substring(0,38)}…</span>`;
  return s;
}
function renderTable(){
  const tbody=document.getElementById('tbody');
  document.getElementById('countBadge').textContent=filtered.length.toLocaleString('tr-TR')+' ilan';
  updateKPI();updateSidebarCounts();
  if(!filtered.length){tbody.innerHTML='<tr><td colspan="100" class="empty">Sonuç bulunamadı</td></tr>';return;}
  const visCols=ALL_COLS.filter(c=>!hiddenCols.has(c));
  tbody.innerHTML=filtered.map(row=>{
    const dur=(row['Durum']||'').toUpperCase();
    const cls=dur.includes('AKTIF')||dur.includes('AKT\u0130F')?'r-aktif':dur.includes('PAS')?'r-pasif':'';
    const tel=row['Telefon']?row['Telefon'].toString().split('|')[0].trim():'';
    const actions=`<div class="action-cell">${row._link?`<a href="${row._link}" target="_blank" class="btn-link">↗ Sahibinden</a>`:''}${tel?`<a href="tel:${tel.replace(/\s/g,'')}" class="btn-tel">📞</a>`:''}</div>`;
    return`<tr class="${cls}"><td>${actions}</td>${visCols.map(col=>`<td>${fmtCell(col,row[col])}</td>`).join('')}</tr>`;
  }).join('');
}
function applyFilters(){
  const q=document.getElementById('searchBox').value.toLowerCase();
  const pMin=parseNum(document.getElementById('priceMin').value.replace(/\./g,''));
  const pMax=parseNum(document.getElementById('priceMax').value.replace(/\./g,''));
  const fK=ALL_COLS.includes('Güncel Fiyat')?'Güncel Fiyat':(ALL_COLS.includes('Fiyat')?'Fiyat':null);
  filtered=ALL_DATA.filter(row=>{
    for(const[col,val]of Object.entries(slicerVals))if(val&&String(row[col]||'')!==val)return false;
    if(!isNaN(pMin)||!isNaN(pMax)){
      const f=fK?parseNum(row[fK]):NaN;
      if(!isNaN(pMin)&&!isNaN(f)&&f<pMin)return false;
      if(!isNaN(pMax)&&!isNaN(f)&&f>pMax)return false;
    }
    if(q){
      const si=['Başlık','Mahalle','Ofis','Danışman','İlan No','Ada No','Parsel No'].map(c=>String(row[c]||'')).join(' ').toLowerCase();
      if(!si.includes(q))return false;
    }
    return true;
  });
  if(sortCol){filtered.sort((a,b)=>{let av=a[sortCol]??'',bv=b[sortCol]??'';const an=parseNum(av),bn=parseNum(bv);if(!isNaN(an)&&!isNaN(bn))return(an-bn)*sortDir;return String(av).localeCompare(String(bv),'tr')*sortDir;});}
  renderTable();
}
function doSort(col,th){sortCol===col?sortDir*=-1:(sortCol=col,sortDir=1);rebuildHeader();applyFilters();}
function resetAll(){
  Object.keys(slicerVals).forEach(k=>slicerVals[k]='');
  document.querySelectorAll('.filter-item').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('[id^="all_"]').forEach(el=>el.classList.add('active'));
  document.getElementById('searchBox').value='';
  document.getElementById('priceMin').value='';
  document.getElementById('priceMax').value='';
  sortCol=null;sortDir=1;rebuildHeader();applyFilters();
}
document.getElementById('searchBox').addEventListener('input',applyFilters);
document.getElementById('priceMin').addEventListener('input',applyFilters);
document.getElementById('priceMax').addEventListener('input',applyFilters);
document.addEventListener('click',e=>{if(!e.target.closest('#colPanel')&&!e.target.closest('.col-toggle-btn'))document.getElementById('colPanel').classList.remove('open');});
applyFilters();
</script>
